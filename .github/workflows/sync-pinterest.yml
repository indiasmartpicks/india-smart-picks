name: 🔄 Auto-Sync Pinterest Products

on:
  schedule:
    # Runs every day at 6:00 AM IST (00:30 UTC)
    - cron: '30 0 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 📊 Scrape Pinterest
        run: python scripts/scrape_pinterest.py
        env:
          AMAZON_AFFILIATE_TAG: indiasmartpicks-21

      - name: 🏗️ Build Website
        run: python scripts/build_site.py
        env:
          AMAZON_AFFILIATE_TAG: indiasmartpicks-21

      - name: 📝 Show Update Summary
        run: |
          echo "=== Sync Complete ==="
          cat scripts/sync_log.txt || echo "No log found"

      - name: 📤 Commit & Push Updated Site
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "India Smart Picks Bot"
          git add -A
          git diff --staged --quiet || git commit -m "🔄 Auto-sync: $(date '+%Y-%m-%d %H:%M IST') — Updated products from Pinterest"
          git push
